bundle:
  name: claro-demo

include:
  - resources/*.yml

variables:
  catalog:
    description: "Unity Catalog catalog name (must already exist)"
    default: "main"
  schema:
    description: "UC schema name — will be created if it does not exist"
    default: "claro"
  user_suffix:
    description: "Optional suffix for table/app names to avoid collisions in shared workspaces (e.g. _dan). Leave empty for single-user or customer deployments."
    default: ""

targets:
  dev:
    default: true
    mode: development
