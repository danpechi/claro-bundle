resources:
  jobs:
    claro_setup:
      name: "[${bundle.target}] claro-setup"
      # Run once after `bundle deploy` to register the model and stand up the endpoint.
      # Task 1 registers the MLflow model in Unity Catalog.
      # Task 2 creates (or updates) the Model Serving endpoint using the version just registered.

      tasks:
        - task_key: gen_data
          spark_python_task:
            python_file: "${workspace.file_path}/src/gen_data.py"
            parameters:
              - "${var.catalog}"
              - "${var.schema}"
              - "${var.user_suffix}"
          environment_key: ml_env

        - task_key: register_model
          spark_python_task:
            python_file: "${workspace.file_path}/src/log_model.py"
            parameters:
              - "${var.catalog}"
              - "${var.schema}"
          environment_key: ml_env

        - task_key: deploy_endpoint
          depends_on:
            - task_key: register_model
          spark_python_task:
            python_file: "${workspace.file_path}/src/deploy_endpoint.py"
            parameters:
              - "${var.catalog}"
              - "${var.schema}"
          environment_key: ml_env

      environments:
        - environment_key: ml_env
          spec:
            client: "4"
            dependencies:
              - "mlflow>=2.14.0"
              - "transformers>=4.40.0,<4.51.0"
              - "torch>=2.0.0"
              - "torchaudio>=2.0.0"
              - "librosa>=0.10.0"
              - "soundfile>=0.12.0"
              - "numpy>=1.24.0"
              - "pandas>=2.0.0"
              - "av>=12.0.0"
